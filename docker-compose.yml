services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: tracemap-db
    environment:
      POSTGRES_DB: tracemap
      POSTGRES_USER: tracemap
      POSTGRES_PASSWORD: tracemap
    ports:
      - "5433:5432"
    volumes:
      - tracemap-db-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracemap -d tracemap"]
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: tracemap-server
    environment:
      DATABASE_URL: postgres://tracemap:tracemap@db:5432/tracemap
      PORT: "4000"
      OTLP_PORT: "4318"
    ports:
      - "4000:4000"   # query API
      - "4318:4318"   # OTLP/HTTP collector
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: tracemap-web
    environment:
      API_PROXY_TARGET: http://server:4000
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  tracemap-db-data:
